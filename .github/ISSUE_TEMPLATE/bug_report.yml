name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! **Never attach real blood report PDFs or patient data** — describe the format or use synthetic data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Uploaded a PDF from lab X and got "Could not extract any markers"...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where did this happen?
      options:
        - Live app (blood-report-analyser-agent.streamlit.app)
        - Local setup
        - Both
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or traceback. Redact any personal data.
      render: shell
